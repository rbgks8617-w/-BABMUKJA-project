<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BABMUKJA</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">오늘 뭐 먹지?</p>
        <h1 id="page-title">BABMUKJA</h1>
        <p class="hero-copy">
          고민은 줄이고, 맛있는 선택은 빠르게. 원하는 분위기를 고르면 메뉴를 추천해드릴게요.
        </p>
      </section>

      <section class="controls" aria-label="메뉴 검색과 추천">
        <label class="search-field" for="menu-search">
          <span>메뉴 검색</span>
          <input id="menu-search" type="search" placeholder="예: 김치찌개, 파스타" />
        </label>

        <div class="category-tabs" role="group" aria-label="카테고리 선택">
          <button class="tab is-active" type="button" data-category="all">전체</button>
          <button class="tab" type="button" data-category="korean">한식</button>
          <button class="tab" type="button" data-category="chinese">중식</button>
          <button class="tab" type="button" data-category="japanese">일식</button>
          <button class="tab" type="button" data-category="western">양식</button>
          <button class="tab" type="button" data-category="snack">분식</button>
        </div>

        <button class="recommend-button" id="recommend-button" type="button">랜덤 추천</button>
      </section>

      <section class="today-menu" aria-live="polite">
        <span>오늘의 추천</span>
        <strong id="today-menu">아직 선택된 메뉴가 없어요</strong>
      </section>

      <section>
        <div class="section-heading">
          <h2>메뉴 리스트</h2>
          <p id="menu-count">0개 메뉴</p>
        </div>
        <div class="menu-grid" id="menu-grid"></div>
      </section>
    </main>

    <script src="./src/app.js"></script>
  </body>
</html>
